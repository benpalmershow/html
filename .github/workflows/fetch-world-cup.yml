name: Fetch World Cup Scores

on:
  schedule:
    # Run every 10 minutes during tournament
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

concurrency:
  group: fetch-world-cup
  cancel-in-progress: false

jobs:
  fetch-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Fetch World Cup scores
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          if [ -z "$FOOTBALL_DATA_API_KEY" ]; then
            echo "FOOTBALL_DATA_API_KEY secret is not set"
            exit 1
          fi
          python3 scripts/fetch_world_cup.py

      - name: Validate World Cup data
        run: |
          python3 -m json.tool json/world-cup.json > /dev/null

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add json/world-cup.json
          if git diff --staged --quiet; then
            echo "No score changes to commit"
            exit 0
          fi
          git commit -m "chore: update World Cup scores [skip ci]"
          git push

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-logs
          path: logs/
          retention-days: 7
