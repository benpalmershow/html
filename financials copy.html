  <!-- Apply theme before first paint to avoid flash -->

     <div class="filter-bar" id="financials-filters" aria-label="Filter indicators by category">
            <button id="searchToggle" class="search-toggle" aria-label="Search" title="Search" type="button">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>

              <input type="text" id="indicatorSearch" class="indicator-search" placeholder="Search indicators..." autocomplete="off">
            </div>
            <div class="filters" id="filter-buttons"></div>
          </div>

    <div class="content">
      <div class="categories" id="categories">
        <div class="loading">Loading indicators…</div>
      </div>

      <noscript>
        <div class="category" style="padding:2rem;text-align:center;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:var(--card-radius);">
          <h2 style="color:var(--logo-teal);margin:0 0 1rem;">JavaScript Required</h2>
          <p style="margin:0;color:var(--text-secondary);">This dashboard requires JavaScript to load and display economic indicators. Please enable JavaScript in your browser settings.</p>
        </div>
      </noscript>

      <!-- 13F Holdings section - loaded lazily -->
      <div id="section-13f" style="display:none;margin-top:15px">
        <div class="category" data-category="13F Holdings">
          <h2 class="category-title">13F Holdings</h2>
          <div class="indicators-grid" id="firmCardsContainer">
            <div class="skeleton-card" style="height:260px"><div class="skeleton-line long"></div></div>
          </div>
        </div>
      </div>

      <!-- World Cup section - loaded lazily -->
      <div id="section-worldcup" style="display:none;margin-top:15px">
        <div class="category" data-category="World Cup">
          <h2 class="category-title">World Cup 2026</h2>
          <div class="indicators-grid" id="worldCupGrid">
            <div class="skeleton-card" style="height:120px"><div class="skeleton-line long"></div></div>
          </div>
        </div>

    </div>

  <script src="js/financials-copy.js" defer></script>

  <!-- Non-critical scripts loaded after idle to reduce TBT -->
  <script>
    (function() {
      const loadNonCriticalScripts = () => {
        // Search functionality
        const searchScript = document.createElement('script');
        searchScript.src = 'js/search.js';
        searchScript.defer = true;
        document.head.appendChild(searchScript);
      };

      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadNonCriticalScripts, { timeout: 2000 });
      } else {
        window.addEventListener('load', () => setTimeout(loadNonCriticalScripts, 1000));
      }
    })();
  </script>
