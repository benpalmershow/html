<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Economic indicators dashboard with real-time data on employment, housing, commodities, financial markets, and prediction markets.">
  <title>Numbers - Howdy, Stranger</title>
  <link rel="stylesheet" href="css/financials-copy.css">
</head>
<body>
  <nav class="site-nav" aria-label="Main">
    <div class="nav-container">
      <a href="index.html" class="nav-brand">Howdy, Stranger</a>
      <ul class="nav-links">
        <li><a href="financials.html" class="active" aria-current="page">Numbers</a></li>
        <li><a href="media.html">Media</a></li>
        <li><a href="journal.html">Docs</a></li>
      </ul>
      <button class="dark-toggle" id="darkToggle" type="button" aria-label="Toggle dark mode">Theme</button>
    </div>
  </nav>

  <main id="main-content">
    <div class="page-header">
      <h1 class="page-title">Numbers</h1>
      <div id="lastUpdated" class="last-updated"></div>
    </div>

    <div class="filter-bar" id="filterBar" aria-label="Filter indicators">
      <div class="filters" id="filterButtons"></div>
    </div>

    <div class="content">
      <div class="categories" id="categories">
        <div class="loading">Loading indicators…</div>
      </div>

      <!-- 13F Holdings section - loaded lazily -->
      <div id="section-13f" style="display:none;margin-top:15px">
        <div class="category" data-category="13F Holdings">
          <h2 class="category-title">13F Holdings</h2>
          <div class="indicators-grid" id="firmCardsContainer">
            <div class="skeleton-card" style="height:260px"><div class="skeleton-line long"></div></div>
          </div>
        </div>
      </div>

      <!-- World Cup section - loaded lazily -->
      <div id="section-worldcup" style="display:none;margin-top:15px">
        <div class="category" data-category="World Cup">
          <h2 class="category-title">World Cup 2026</h2>
          <div class="indicators-grid" id="worldCupGrid">
            <div class="skeleton-card" style="height:120px"><div class="skeleton-line long"></div></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Floating explanation tooltip -->
  <div id="explTooltip" class="explanation-tooltip" role="tooltip">
    <button class="tooltip-close" id="tooltipClose" aria-label="Close">×</button>
    <div id="tooltipBody"></div>
  </div>

  <script>
  /* ==========================================
     DARK MODE - runs before first paint
  ========================================== */
  (function(){
    try{
      var s=localStorage.getItem('darkMode');
      var dark=s===null?window.matchMedia('(prefers-color-scheme: dark)').matches:s==='1';
      document.documentElement.classList.toggle('dark-mode',dark);
    }catch(e){}
  })();
  </script>

  <script src="js/financials-copy.js" defer></script>
</body>
</html>
