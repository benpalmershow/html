<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Economic indicators dashboard with real-time data on employment, housing, commodities, financial markets, and prediction markets.">
  <title>Numbers - Howdy, Stranger</title>
  <style>
    :root {
      --font-body: Georgia, 'Times New Roman', serif;
      --font-mono: Monaco, Menlo, 'Ubuntu Mono', 'Courier New', monospace;
      --type-base: clamp(1rem, 3.5vw, 1.25rem);
      --color-primary: #2c5f5a;
      --color-secondary: #d4822a;
      --color-white: #ffffff;
      --color-black: #000000;
      --color-gray-500: #6c757d;
      --color-gray-700: #343a40;
      --color-gray-800: #212529;
      --text-primary: var(--color-black);
      --text-secondary: var(--color-gray-700);
      --text-muted: var(--color-gray-500);
      --bg-primary: #fdf6e8;
      --bg-secondary: #f8f4e6;
      --bg-tertiary: #e9e2d0;
      --border-color: #e8dcc0;
      --logo-teal: var(--color-primary);
      --logo-orange: var(--color-secondary);
      --radius-lg: 8px;
      --radius-md: 6px;
      --spacing-xs: 0.5rem;
      --spacing-sm: 0.75rem;
      --spacing-md: 1.25rem;
      --spacing-lg: 2rem;
      --spacing-xl: 3rem;
      --max-content-width: 1440px;
      --content-padding: var(--spacing-md);
      --section-spacing: var(--spacing-xl);
      --transition-base: 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; }

    html {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background: var(--bg-primary);
    }

    body {
      min-height: 100vh;
      margin: 0;
      padding: 0;
      font-family: var(--font-body);
      line-height: 1.7;
      background: var(--bg-primary);
      color: var(--text-secondary);
      font-size: var(--type-base);
      display: flex;
      flex-direction: column;
    }

    nav {
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-color);
      padding: var(--spacing-sm) var(--content-padding);
    }

    .nav-inner {
      max-width: var(--max-content-width);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--spacing-md);
    }

    .nav-brand {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-primary);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: var(--spacing-md);
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .nav-links a {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-secondary);
      text-decoration: none;
      padding: 4px 8px;
      border-radius: var(--radius-md);
    }

    .nav-links a.active {
      color: var(--text-primary);
      background: var(--bg-secondary);
    }

    .content {
      padding: var(--content-padding);
      margin: 0 auto;
      max-width: var(--max-content-width);
      width: 100%;
      flex: 1;
    }

    .page-header {
      padding-top: var(--spacing-lg);
      padding-bottom: var(--spacing-md);
    }

    .page-title {
      font-size: 0.85rem;
      font-family: var(--font-mono);
      color: var(--text-secondary);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 0;
    }

    .last-updated {
      font-size: 0.72rem;
      font-family: var(--font-mono);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-secondary);
      text-align: center;
      margin-top: 2px;
      opacity: 0.75;
    }

    .filter-bar {
      display: flex;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-lg);
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-btn {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 6px 12px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background var(--transition-base), color var(--transition-base);
    }

    .filter-btn:hover {
      background: var(--bg-secondary);
    }

    .filter-btn.active {
      background: var(--logo-teal);
      color: var(--color-white);
      border-color: var(--logo-teal);
    }

    .categories {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-lg);
    }

    .category {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: var(--spacing-md);
      border: 1px solid var(--border-color);
      content-visibility: auto;
      contain-intrinsic-size: 1px 500px;
    }

    .category-title {
      font-size: clamp(1.1rem, 4vw, 1.4rem);
      color: var(--color-primary);
      margin: 0 0 var(--spacing-md) 0;
      font-family: var(--font-body);
      font-weight: 700;
    }

    .indicators-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: var(--spacing-md);
    }

    .indicator-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .indicator {
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      padding: var(--spacing-sm);
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      gap: 6px;
      contain: layout style;
    }

    .indicator-name {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.3;
      flex: 1;
    }

    .expand-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s ease;
      border-radius: 6px;
      width: 24px;
      height: 24px;
    }

    .expand-toggle:hover {
      background: var(--bg-secondary);
      color: var(--logo-teal);
    }

    .indicator.expanded .expand-toggle svg {
      transform: rotate(180deg);
    }

    .data-rows-container {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .indicator.expanded .data-rows-container {
      max-height: 1200px;
    }

    .indicator-agency {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .indicator-agency a {
      color: var(--text-muted);
      text-decoration: underline;
    }

    .latest-data-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 0.85rem;
    }

    .data-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 0.85rem;
    }

    .month-label {
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 0.7rem;
    }

    .month-value {
      font-weight: 700;
      color: var(--text-primary);
      font-size: 0.85rem;
      text-align: right;
    }

    .change-indicators {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }

    .change-metric-btn {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
    }

    .change-positive {
      background: rgba(34, 197, 94, 0.1);
      color: #16a34a;
    }

    .change-negative {
      background: rgba(239, 68, 68, 0.1);
      color: #dc2626;
    }

    .change-neutral {
      background: rgba(156, 163, 175, 0.1);
      color: var(--text-muted);
    }

    .loading {
      text-align: center;
      padding: var(--spacing-xl);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.85rem;
    }

    .error {
      text-align: center;
      padding: var(--spacing-xl);
      color: #dc2626;
      font-family: var(--font-mono);
    }

    @media (max-width: 768px) {
      :root {
        --content-padding: var(--spacing-sm);
        --section-spacing: var(--spacing-lg);
      }
      .indicators-grid {
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: var(--spacing-sm);
      }
      .nav-links { gap: var(--spacing-sm); }
    }

    @media (max-width: 480px) {
      .indicators-grid {
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
      }
      .indicator { padding: 0.5rem; }
      .indicator-name { font-size: 0.8rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

es of imports, often used as a tool of trade policy. Revenue from tariffs goes directly to the U.S. Treasury and can be used to fund government operations. Changes in tariff revenue can reflect shifts in trade volumes, tariff rates, or the composition of imports. Tariff revenue typically increases with new or increased tariffs but may decrease if the tariffs reduce overall trade volumes. This metric is closely watched in trade policy discussions and budget analysis."},{"id":"new-orders","category":"Business Indicators","type":"business","isActive":true,"tags":["business","manufacturing","orders"],"displayOrder":35,"icon":"fa-shopping-cart","color":"#2ecc71","units":"dollars","region":"us","parentCategory":"Business Indicators","agency":"Commerce","name":"New Orders for Manufactured Goods","lastUpdated":"2026-06-28T14:00:00Z","releaseDay":3,"url":"https://www.census.gov/economic-indicators/","march":"$617.4B","april":"$593.5B","may":"$642.5B","june":"$611.5B","july":"$603.6B","august":"$611.5B","september":"$612.9B","october":"$605.4B","november":"$621.9B","december":"$619.1B","2026":{"january":"$619.4B","february":"$621.3B","march":"$632.6B","april":"$662.7B"},"change":"","explanation":"The New Orders indicator measures the value of new orders placed with domestic manufacturers for both durable and non-durable goods. It's a leading indicator of manufacturing activity and future production. The data, published by the U.S. Census Bureau, is adjusted for seasonal variation and trading day differences. A rising trend in new orders typically signals increased production and employment in the manufacturing sector, while declining orders may indicate an economic slowdown. The report breaks down orders by industry and includes data on unfilled orders and inventories, providing insights into supply chain conditions and future manufacturing activity."},{"id":"employment-trends-index","category":"Employment Indicators","type":"employment","isActive":true,"tags":["employment","
