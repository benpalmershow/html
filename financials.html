  <script>
    (function () {
      const toggle = document.getElementById('darkModeToggle');
      function updateToggle() {
        if (!toggle) return;
        const isDark = document.documentElement.classList.contains('dark-mode');
        toggle.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
        toggle.setAttribute('title', isDark ? 'Switch to light mode' : 'Switch to dark mode');
      }
      if (toggle) {
        toggle.addEventListener('click', () => {
          document.documentElement.classList.toggle('dark-mode');
          try { localStorage.setItem('darkMode', document.documentElement.classList.contains('dark-mode') ? '1' : '0'); } catch (e) {}
          updateToggle();
        });
      }
      updateToggle();
    })();
  </script>

   <!-- Load Lucide icons on-demand after page load -->
  <script>
    (function () {
      const loadLucide = () => {
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/lucide@0.400.0/dist/umd/lucide.js';
        script.defer = true;
        script.onload = () => window.lucide?.createIcons();
        document.head.appendChild(script);
      };
      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadLucide, { timeout: 3000 });
      } else {
        setTimeout(loadLucide, 100);
      }
    })();
  </script>
