<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Load HtmlUtils first - required for component loading -->
  <script src="js/html-utils.js"></script>

  <!-- Common Meta Tags Component -->
  <script>
    if (!window.HtmlUtils) {
      console.error('HtmlUtils not loaded');
    } else {
      window.HtmlUtils.injectHeadElements('components/head-meta.html');
    }
  </script>

  <!-- Page-specific Meta Tags -->
  <meta name="color-scheme" content="dark">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="site-data-version" content="20260320">

  <!-- Typography System Fonts Component -->
  <script>
    window.HtmlUtils?.injectHeadElements('components/fonts.html');
  </script>

  <!-- Preconnect to external domains - CRITICAL for performance -->
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>

  <!-- Preload CRITICAL resources only -->
  <link rel="preload" href="css/body.css?v=20260429" as="style">
  <link rel="preload" href="css/nav.css?v=20260429" as="style">
  <link rel="preload" href="css/financials.css?v=20260429" as="style">

  <!-- Preload critical scripts -->
  <link rel="preload" href="js/nav.js" as="script">
  <link rel="preload" href="js/financials.js" as="script">

  <!-- Critical CSS -->
  <link rel="stylesheet" href="css/theme.css?v=20260429">
  <link rel="stylesheet" href="css/body.css?v=20260429">
  <link rel="stylesheet" href="css/nav.css?v=20260429">
  <link rel="stylesheet" href="css/financials.css?v=20260429">
  <link rel="stylesheet" href="css/page-branding.css?v=20260510">

  <!-- Chart.js for interactive charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>

  <!-- Infogram Embed Script (deferred) -->
  <script defer>
    document.addEventListener('DOMContentLoaded', function() {
      ! function (e, n, i, s) {
        var d = "InfogramEmbeds";
        var o = e.getElementsByTagName(n)[0];
        if (window[d] && window[d].initialized)
          window[d].process && window[d].process();
        else if (!e.getElementById(i)) {
          var r = e.createElement(n);
          r.async = 1,
            r.id = i,
            r.src = s,
            o.parentNode.insertBefore(r, o)
        }
      }(document, "script", "infogram-async",
        "https://e.infogram.com/js/dist/embed-loader-min.js");
    });
  </script>

  <!-- Lucide Icons -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.400.0/dist/umd/lucide.js" defer></script>

  <title>Financials - Howdy, Stranger</title>

  <!-- Analytics Component -->
  <script>
    window.HtmlUtils?.injectScriptsFromComponent('components/analytics.html');
  </script>

  <!-- Error Handling Component -->
  <script>
    window.HtmlUtils?.injectScriptsFromComponent('components/error-handling.html');
  </script>

  <!-- Inline critical CSS for LCP -->
  <style>
    /* Search input styles - matching body.css */
    .search-wrapper {
        position: relative;
        max-width: 280px;
        margin: 10px auto 0;
    }

    .search-icon {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        color: var(--text-muted, #6c757d);
        pointer-events: none;
    }

    .indicator-search {
        width: 100%;
        padding: 0.5rem 0.75rem 0.5rem 2rem;
        border: 1px solid var(--border-color, #e5e7eb);
        border-radius: 8px;
        background: var(--bg-secondary, #f9fafb);
        color: var(--text-primary, #111827);
        font-size: 0.9rem;
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .indicator-search:focus {
        border-color: var(--logo-teal, #2c5f5a);
        box-shadow: 0 0 0 2px rgba(44, 95, 90, 0.15);
    }

    .indicator-search::placeholder {
        color: var(--text-muted, #6c757d);
        opacity: 0.6;
    }
  </style>

  <script type="module" src="js/speed-insights.js"></script>
  <meta name="robots" content="noindex, nofollow">
</head>

<body>
  <a href="#main-content" class="skip-to-content">Skip to main content</a>
  <nav class="nav-links" id="main-nav"></nav>
  <div class="page-left-accent">
    <img src="images/read.webp" alt="" width="32" height="32">
  </div>

  <main class="container" id="main-content" tabindex="-1">
    <div class="page-header page-header-branded page-header-bg-brand read-bg animated-bg">
      <img src="images/read.webp" alt="" width="32" height="32" class="page-brand-icon character-scholar entrance-slide">
      <h1 class="page-title" aria-label="Page title">Numbers</h1>
    </div>
    <div class="collapsible-container">

      <div class="collapsible-content" id="interactive-dashboard-content">
        <div id="essay-filters" class="filters" aria-label="Filter indicators by category"></div>

        <div class="search-wrapper">
          <i data-lucide="search" class="search-icon"></i>
          <input type="text" id="indicatorSearch" class="indicator-search" placeholder="Search indicators..." autocomplete="off">
        </div>

        <div id="lastUpdated" class="last-updated"></div>

        <div class="categories" id="categories"></div>

        <!-- 13F Holdings Section -->
        <div id="latest-13f-filings-anchor"></div>
        <div class="category" id="latest-13f-filings" data-category="13F Holdings">
          <h2 class="category-title">
            <span class="category-icon"><i data-lucide="building-2"></i></span>
            <span class="category-name">13F Holdings</span>
          </h2>
          <div class="indicators-grid" id="firmCardsContainer">
           </div>
         </div>


      </div>
    </div>
  </main>

  <!-- Footer Component -->
  <div id="footer-container"></div>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      window.HtmlUtils?.loadComponentToElement('components/footer.html', '#footer-container');
    });
  </script>

  <!-- Unified Scripts Component -->
  <script>
    window.HtmlUtils?.injectScriptsFromComponent('components/scripts-unified.html');
  </script>

  <!-- Financials Module Scripts (loaded in dependency order) -->
  <script src="js/html-utils.js" defer></script>
  <script src="js/services.js" defer></script>
  <script src="js/utils.js?v=20260222" defer></script>
  <script src="js/indicators.js?v=20260222" defer></script>
  <script src="js/charts.js" defer></script>
  <script src="js/filters.js" defer></script>
  <script src="js/13f-holdings.js" defer></script>
  <script src="js/financials.js" defer></script>

  <!-- Navigation script -->
  <script src="js/nav.js" defer></script>
  <script src="js/swipe-nav.js" defer></script>
  <script src="js/bfcache-compat.js" defer></script>
  <script src="js/countdown.js" defer></script>

  <!-- Load Lucide icons on-demand after page load -->
  <script>
    (function () {
      const loadLucide = () => {
        if (window.lucide) return;
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/lucide@0.400.0/dist/umd/lucide.js';
        script.defer = true;
        script.onload = () => window.lucide?.createIcons();
        document.head.appendChild(script);
      };

      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadLucide, { timeout: 3000 });
      } else {
        setTimeout(loadLucide, 100);
      }
    })();
  </script>

  <!-- Load non-critical analytics after idle -->
  <script>
    const loadNonCriticalScripts = () => {
      const speedInsights = document.createElement('script');
      speedInsights.src = 'js/speed-insights.js';
      speedInsights.type = 'module';
      speedInsights.defer = true;
      document.body.appendChild(speedInsights);
    };

     if ('requestIdleCallback' in window) {
       requestIdleCallback(loadNonCriticalScripts);
     } else {
       window.addEventListener('load', () => setTimeout(loadNonCriticalScripts, 1000));
     }
   </script>

  <!-- Chart Modal Popup -->
  <div id="chartModal" class="chart-modal">
    <div class="chart-modal-content">
      <div class="chart-modal-range-picker" id="chartRangePicker">
        <button class="range-btn" data-range="3">3M</button>
        <button class="range-btn" data-range="6">6M</button>
        <button class="range-btn active" data-range="12">1Y</button>
        <button id="closeChartModal">&times;</button>
      </div>
      <div class="chart-modal-body">
      </div>
    </div>
  </div>

  <!-- Back to top button -->
  <script src="js/back-to-top.js" data-threshold="300" data-duration="400" data-label="Back to top" data-position="right" defer></script>

</body>
</html>
