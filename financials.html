  <script src="js/financials.js?v=20260701c" defer></script>

  <!-- Non-critical scripts loaded after idle to reduce TBT -->
  <script>
    (function() {
      const loadNonCriticalScripts = () => {
        const searchScript = document.createElement('script');
        searchScript.src = 'js/search.js';
        searchScript.defer = true;
        document.head.appendChild(searchScript);

        // 13F Holdings - appears later in page
        const holdingsScript = document.createElement('script');
        holdingsScript.src = 'js/13f-holdings.js';
        holdingsScript.defer = true;
        document.head.appendChild(holdingsScript);

        // World Cup - appears later in page
        const worldCupScript = document.createElement('script');
        worldCupScript.src = 'js/world-cup.js';
        worldCupScript.defer = true;
        document.head.appendChild(worldCupScript);

        // Countdown - non-critical
        const countdownScript = document.createElement('script');
        countdownScript.src = 'js/countdown.js';
        countdownScript.defer = true;
        document.head.appendChild(countdownScript);
      };

      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadNonCriticalScripts, { timeout: 2000 });
      } else {
        window.addEventListener('load', () => setTimeout(loadNonCriticalScripts, 1000));
      }
    })();
  </script>

   <!-- Load Lucide icons on-demand after page load -->
  <script src="js/lucide-loader.js" defer></script>

<!-- Chart Modal Popup -->

          <button id="closeChartModal" aria-label="Close chart dialog">&times;</button>
        </div>

        </div>
      </div>
    </div>
