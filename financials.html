<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- Common Meta Tags Component -->
  <script>
    fetch('components/head-meta.html')
      .then(response => response.text())
      .then(html => {
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = html;
        const metaElements = tempDiv.querySelectorAll('meta, link');
        metaElements.forEach(element => {
          document.head.appendChild(element.cloneNode(true));
        });
      })
      .catch(error => console.error('Meta tags load error:', error));
  </script>

  <!-- Page-specific Meta Tags -->
  <meta name="color-scheme" content="dark">

  <title>Financials - Howdy, Stranger</title>

  <!-- Typography System Fonts Component -->
  <script>
    fetch('components/fonts.html')
      .then(response => response.text())
      .then(html => {
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = html;
        const linkElements = tempDiv.querySelectorAll('link');
        linkElements.forEach(element => {
          document.head.appendChild(element.cloneNode(true));
        });
      })
      .catch(error => console.error('Fonts load error:', error));
  </script>

  <!-- Critical CSS -->
  <link rel="stylesheet" href="css/theme.css?v=20260429">
  <link rel="stylesheet" href="css/body.css?v=20260429">
  <link rel="stylesheet" href="css/nav.css?v=20260429">
  <link rel="stylesheet" href="css/filter-bar.css?v=20260614">
  <link rel="stylesheet" href="css/financials.css?v=20260429">
  <link rel="stylesheet" href="css/worldcup.css?v=20260613">
  <link rel="stylesheet" href="css/page-branding.css?v=20260510">

  <!-- Preload critical resources -->
  <link rel="preload" href="js/services.js" as="script">
  <link rel="preload" href="js/utils.js?v=20260222" as="script">
  <link rel="preload" href="js/indicators.js?v=20260222" as="script">
  <link rel="preload" href="js/charts.js" as="script">
  <link rel="preload" href="js/filters.js" as="script">
  <link rel="preload" href="js/13f-holdings.js" as="script">
  <link rel="preload" href="js/financials.js" as="script">
  <link rel="preload" href="js/nav.js" as="script">
  <link rel="preload" href="js/countdown.js" as="script">

  <!-- Analytics Component -->
  <script>
    fetch('components/analytics.html')
      .then(response => response.text())
      .then(html => {
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = html;
        const scriptElements = tempDiv.querySelectorAll('script');
        scriptElements.forEach(script => {
          const newScript = document.createElement('script');
          newScript.textContent = script.textContent;
          document.head.appendChild(newScript);
        });
      })
      .catch(error => console.error('Analytics load error:', error));
  </script>

  <!-- Vercel Insights - Production only -->
  <script>
    if (typeof window !== 'undefined' && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
      const script = document.createElement('script');
      script.src = '/_vercel/insights/script.js';
      script.defer = true;
      document.head.appendChild(script);
    }
  </script>

  <!-- Chart.js for interactive charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>

  <!-- Infogram Embed Script (deferred) -->
  <script defer>
    document.addEventListener('DOMContentLoaded', function() {
      ! function (e, n, i, s) {
        var d = "InfogramEmbeds";
        var o = e.getElementsByTagName(n)[0];
        if (window[d] && window[d].initialized)
          window[d].process && window[d].process();
        else if (!e.getElementById(i)) {
          var r = e.createElement(n);
          r.async = 1,
            r.id = i,
            r.src = s,
            o.parentNode.insertBefore(r, o)
        }
      }(document, "script", "infogram-async",
        "https://e.infogram.com/js/dist/embed-loader-min.js");
    });
  </script>

  <!-- Lucide Icons -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.400.0/dist/umd/lucide.js" defer></script>

   <!-- Performance monitoring -->
   <script src="js/speed-insights.js" defer></script>
<meta name="robots" content="noindex, nofollow">
  <script>try{if(localStorage.getItem('darkMode')==='1')document.documentElement.classList.add('dark-mode');}catch(e){}</script>
</head>
<body>

  <nav class="nav-links" id="main-nav"></nav>
 

   <main id="main-content" tabindex="-1">
     <div class="page-header page-header-branded page-header-bg-brand read-bg animated-bg">
      <h1 class="page-title" aria-label="Page title">Numbers</h1>
      <div id="lastUpdated" class="last-updated"></div>
    </div>

     <div class="filter-bar" id="financials-filters" aria-label="Filter indicators by category">
            <button id="searchToggle" class="search-toggle" aria-label="Search" title="Search" type="button">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </button>
            <div class="filter-bar-search" id="filterBarSearch">
              <input type="text" id="indicatorSearch" class="indicator-search" placeholder="Search indicators..." autocomplete="off">
            </div>
            <div class="filters" id="filter-buttons"></div>
          </div>

        <div class="content">
        <div class="categories" id="categories">
          <!-- Indicator categories rendered here by renderDashboard -->
          <div id="indicator-categories"></div>

          <!-- 13F Holdings Section -->
          <div id="latest-13f-filings-anchor"></div>
          <div class="category" id="latest-13f-filings" data-category="13F Holdings">
            <h2 class="category-title">
              <span class="category-icon"><i data-lucide="building-2"></i></span>
              <span class="category-name">13F Holdings</span>
            </h2>
            <div class="indicators-grid" id="firmCardsContainer"></div>
          </div>

          <!-- World Cup Score Card -->
          <div class="category" id="world-cup" data-category="World Cup">
            <h2 class="category-title">
              <span class="category-icon"><i data-lucide="trophy"></i></span>
              <span class="category-name">World Cup 2026</span>
            </h2>
            <div class="indicators-grid" id="worldCupGrid"></div>
          </div>
        </div>
      </div>
  </main>

  <!-- Footer Component -->
  <div id="footer-container"></div>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      fetch('components/footer.html')
        .then(response => response.text())
        .then(html => {
          document.getElementById('footer-container').innerHTML = html;
        })
        .catch(error => {
          console.error('Footer load error:', error);
        });
    });
  </script>

  <!-- Error Handling Component -->
  <script>
    fetch('components/error-handling.html')
      .then(response => response.text())
      .then(html => {
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = html;
        const scriptElements = tempDiv.querySelectorAll('script');
        scriptElements.forEach(script => {
          const newScript = document.createElement('script');
          newScript.textContent = script.textContent;
          document.head.appendChild(newScript);
        });
      })
      .catch(error => console.error('Error Handling load error:', error));
  </script>

  <!-- Unified Scripts Component -->
  <script>
    fetch('components/scripts-unified.html')
      .then(response => response.text())
      .then(html => {
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = html;
        const scriptElements = tempDiv.querySelectorAll('script');
        scriptElements.forEach(script => {
          const newScript = document.createElement('script');
          newScript.textContent = script.textContent;
          document.head.appendChild(newScript);
        });
      })
      .catch(error => console.error('Scripts load error:', error));
  </script>

  <!-- Financials Module Scripts (loaded in dependency order) -->
  <script src="js/html-utils.js"></script>
  <script src="js/services.js"></script>
  <script src="js/utils.js?v=20260222" defer></script>
  <script src="js/indicators.js?v=20260222" defer></script>
  <script src="js/charts.js" defer></script>
  <script src="js/filters.js" defer></script>
  <script src="js/search.js" defer></script>
  <script src="js/13f-holdings.js" defer></script>
  <script src="js/financials.js" defer></script>
  <script src="js/world-cup.js" defer></script>

<!-- Navigation script -->
   <script src="js/pages-config.js" defer></script>
   <script src="js/nav.js" defer></script>
   <script src="js/swipe-nav.js" defer></script>
   <script src="js/countdown.js" defer></script>

<!-- Chart Modal Popup -->
    <div id="chartModal" class="chart-modal" role="dialog" aria-modal="true" aria-labelledby="chartModalTitle">
      <div class="chart-modal-content">
        <div class="chart-modal-range-picker" id="chartRangePicker">
          <h3 id="chartModalTitle" class="chart-modal-title">Chart View</h3>
          <button class="range-btn" data-range="3">3M</button>
          <button class="range-btn" data-range="6">6M</button>
          <button class="range-btn active" data-range="12">1Y</button>
          <button id="closeChartModal" aria-label="Close chart dialog">&times;</button>
        </div>
        <div class="chart-modal-body">
        </div>
      </div>
    </div>

    <!-- Back to top button -->
    <script src="js/back-to-top.js" data-threshold="300" data-duration="400" data-label="Back to top" data-position="right" defer></script>

  </body>
</html>
