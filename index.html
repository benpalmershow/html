  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }

    let gaLoaded = false;
    const loadGA = () => {
      if (gaLoaded) return;
      gaLoaded = true;
      gtag('js', new Date());
      gtag('config', 'G-DWEVPGLJDP', { 'anonymize_ip': true, 'cookie_flags': 'SameSite=None;Secure' });
      gtag('config', 'AW-16914260010');

      const script = document.createElement('script');
      script.src = 'https://www.googletagmanager.com/gtag/js?id=G-DWEVPGLJDP';
      script.async = true;
      document.head.appendChild(script);
    };

    // Load after 10 seconds or on first interaction
    let gaTimeout = setTimeout(loadGA, 10000);

    const loadOnInteraction = () => {
      clearTimeout(gaTimeout);
      loadGA();
      document.removeEventListener('click', loadOnInteraction);
      document.removeEventListener('scroll', loadOnInteraction);
      document.removeEventListener('keydown', loadOnInteraction);
    };
    document.addEventListener('click', loadOnInteraction, { passive: true, once: true });
    document.addEventListener('scroll', loadOnInteraction, { passive: true, once: true });
    document.addEventListener('keydown', loadOnInteraction, { passive: true, once: true });
  </script>

  <style>
    /* Accessibility: Skip to content */
    .skip-to-content {
      position: absolute;
      left: -9999px;
      z-index: 9999;
      padding: 0.5rem 1rem;
      background: var(--bg-primary);
      color: var(--text-primary);
      text-decoration: none;
      border-radius: 0 0 4px 4px;
    }
    .skip-to-content:focus {
      left: 50%;
      transform: translateX(-50%);
      top: 0;
    }

    /* Homepage hero and quick navigation */
    .home-hero {
      max-width: 980px;
      margin: 1.25rem auto 0;
      padding: 1.5rem 1.25rem 1.6rem;
      border: 1px solid var(--border-color);
      border-radius: 16px;
      background: var(--bg-secondary);
      box-shadow: 0 8px 28px rgba(var(--accent-primary-rgb), 0.08);
      animation: heroFadeIn 0.6s ease-out;
    }

    @keyframes heroFadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .home-kicker {
      margin: 0 0 0.35rem;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .home-title {
      margin: 0;
      font-family: var(--font-display);
      line-height: 1.15;
      font-size: clamp(1.6rem, 5vw, 2.35rem);
      color: var(--text-primary);
    }

    .home-subtitle {
      margin: 0.6rem 0 1rem;
      max-width: 62ch;
      color: var(--text-secondary);
      font-size: 1rem;
      line-height: 1.55;
    }

    .home-link-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.65rem;
    }

    /* Dark mode support for hero section */
    @media (prefers-color-scheme: dark) {
      .home-hero {
        background: var(--bg-secondary);
      }
    }
    html.dark-mode .home-hero {
      background: var(--bg-secondary);
    }

    .home-link-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      text-decoration: none;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      background: var(--bg-primary);
      padding: 0.75rem 0.7rem;
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .home-link-icon {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 0.5rem;
    }

    .home-link-card:hover,
    .home-link-card:focus-visible {
      transform: translateY(-4px);
      border-color: var(--accent-primary);
      box-shadow: 0 10px 24px rgba(var(--accent-primary-rgb), 0.18);
      outline: none;
    }

    .home-link-card:nth-child(1) { animation: cardFadeIn 0.5s ease-out 0.1s both; }
    .home-link-card:nth-child(2) { animation: cardFadeIn 0.5s ease-out 0.2s both; }
    .home-link-card:nth-child(3) { animation: cardFadeIn 0.5s ease-out 0.3s both; }
    .home-link-card:nth-child(4) { animation: cardFadeIn 0.5s ease-out 0.4s both; }

    @keyframes cardFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .home-link-title {
      display: block;
      font-family: var(--font-display);
      color: var(--text-primary);
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .home-link-desc {
      display: block;
      margin-top: 0.25rem;
      color: var(--text-muted);
      font-size: 0.82rem;
      line-height: 1.3;
    }

    .page-title {
      font-size: 0.85rem;
      font-family: var(--font-display);
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      text-align: center;
      margin: var(--spacing-xl) 0 var(--spacing-lg) 0;
      padding-bottom: var(--spacing-md);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      min-height: 24px;
      position: relative;
    }

    .page-title::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
      border-radius: 1px;
    }

    .page-title .page-icon {
      width: 1.4rem;
      height: 1.4rem;
      flex-shrink: 0;
      object-fit: contain;
      margin-right: 2px;
    }

    @media (max-width: 900px) {
      .home-link-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .home-hero {
        margin-top: 0.9rem;
        padding: 1rem 0.8rem;
      }

      .home-link-grid {
        grid-template-columns: 1fr;
      }

      .page-title {
        font-size: 0.8rem;
        margin: var(--spacing-md) 0 var(--spacing-sm) 0;
      }
    }
  </style>

  <script defer>
    // Library loader
    (function () {
      function loadScript(src, callback) {
        const script = document.createElement('script');
        script.src = src;
        script.async = true;
        script.onload = callback;
        script.onerror = () => console.error('Failed to load script:', src);
        document.head.appendChild(script);
      }

      // Load lucide after idle
      const loadLucide = () => {
        loadScript('https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.js', () => {
          setTimeout(() => window.lucide?.createIcons(), 0);
        });
      };

      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadLucide, { timeout: 3000 });
      } else {
        setTimeout(loadLucide, 100);
      }

      // On-demand loaders for libraries used only on specific pages
      window.loadMarked = () => new Promise(resolve => {
        if (window.marked) return resolve(window.marked);
        loadScript('https://cdn.jsdelivr.net/npm/marked/marked.min.js', () => resolve(window.marked));
      });

      window.loadChartJS = () => new Promise(resolve => {
        if (window.Chart) return resolve(window.Chart);
        loadScript('https://cdn.jsdelivr.net/npm/chart.js', () => resolve(window.Chart));
      });
    })();
  </script>
