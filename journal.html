<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journal - Howdy, Stranger</title>
  <script>try{if(localStorage.getItem('darkMode')==='1')document.documentElement.classList.add('dark-mode');}catch(e){}</script>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/body.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/journal.css">
</head>
<body>
  <a href="#main-content" class="skip-to-content">Skip to main content</a>
  <nav class="nav-links" id="main-nav"></nav>

 <main id="main-content" tabindex="-1">
      <div class="page-header page-header-branded page-header-bg-brand media-bg animated-bg">
        <h1 class="page-title" aria-label="Page title">Docs</h1>
      </div>

    <div class="content">
      <div id="feed"></div>
      <p id="empty">No entries found.</p>
    </div>
  </main>

  <script src="js/nav.js" defer></script>
  <script src="js/back-to-top.js" defer></script>
  <script>
  (function() {
    'use strict';

    const feed    = document.getElementById('feed');
    const emptyEl  = document.getElementById('empty');

    let allDays = [];
  let markedLoaded  = false;
  let markedLoading = false;
  const markedCallbacks = [];

  // ── Front matter stripper ──
   function stripFrontmatter(md) {
     const match = String(md || '').match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
     return match ? match[2].trim() : md;
   }

   // ── Markdown loader — deferred until first accordion open ──
  function loadMarked(cb) {
    if (markedLoaded) { cb(); return; }
    markedCallbacks.push(cb);
    if (markedLoading) return;
    markedLoading = true;
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/marked@9/marked.min.js';
    s.onload = () => {
      markedLoaded = true;
      markedCallbacks.forEach(fn => fn());
      markedCallbacks.length = 0;
    };
    document.head.appendChild(s);
  }

  // ── Fetch .md files on demand, cache in memory ──
  const mdCache = {};
  function fetchMd(path, cb) {
    if (mdCache[path]) { cb(mdCache[path]); return; }
    fetch(path)
      .then(r => r.ok ? r.text() : Promise.reject(r.status))
      .then(text => { mdCache[path] = text; cb(text); })
      .catch(() => cb(null));
  }

  // ── Title may contain raw HTML <a> tags already ──
  function renderTitle(title, link) {
    if (/<a\s/i.test(title)) return title;
    const esc = title.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if (link) {
      const ext = link.startsWith('http') ? ' target="_blank" rel="noopener noreferrer"' : '';
      return `<a href="${link}"${ext}>${esc}</a>`;
    }
    return esc;
  }

  // ── Build one entry ──
  function buildEntry(entry) {
    const hasFile    = !!entry.file;
    const hasContent = !!entry.content;
    const hasLink    = !!entry.link;

    const div     = document.createElement('div');
    div.className = 'entry';

    const headEl     = document.createElement('div');
    headEl.className = 'entry-head' + (hasFile ? ' has-toggle' : '');

    // Title
    const titleEl     = document.createElement('span');
    titleEl.className = 'entry-title';
    const linkForTitle = hasLink ? entry.link : null;
    titleEl.innerHTML  = renderTitle(entry.title, linkForTitle);

    // Meta
    const metaEl     = document.createElement('span');
    metaEl.className = 'entry-meta';

    if (entry.time) {
      const t = document.createElement('span');
      t.className = 'entry-time';
      t.textContent = entry.time;
      metaEl.appendChild(t);
    }

    headEl.appendChild(titleEl);
    headEl.appendChild(metaEl);

    // Accordion for file-based entries
    let accordionEl = null;
    if (hasFile) {
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('class',            'chevron');
      svg.setAttribute('viewBox',          '0 0 14 14');
      svg.setAttribute('fill',             'none');
      svg.setAttribute('stroke',           'currentColor');
      svg.setAttribute('stroke-width',     '1.5');
      svg.setAttribute('stroke-linecap',   'round');
      svg.setAttribute('stroke-linejoin',  'round');
      svg.setAttribute('aria-hidden',      'true');
      svg.innerHTML = '<polyline points="4,2 9,7 4,12"/>';
      headEl.insertBefore(svg, titleEl);

      accordionEl = document.createElement('div');
      accordionEl.className = 'accordion';
      accordionEl.hidden    = true;
      accordionEl.setAttribute('role', 'region');

      const inner     = document.createElement('div');
      inner.className = 'accordion-inner';
      accordionEl.appendChild(inner);

      let loaded = false;
      headEl.setAttribute('role',         'button');
      headEl.setAttribute('tabindex',     '0');
      headEl.setAttribute('aria-expanded','false');

      function toggle() {
        const open = headEl.getAttribute('aria-expanded') === 'true';
        headEl.setAttribute('aria-expanded', String(!open));
        accordionEl.hidden = open;

        if (!open && !loaded) {
          loaded = true;
          inner.innerHTML = '<span class="loading">Loading…</span>';
          loadMarked(() => {
fetchMd(entry.file, text => {
               const body = stripFrontmatter(text);
               inner.innerHTML = body
                 ? window.marked.parse(body)
                 : '<span class="loading">Could not load file.</span>';
             });
          });
        }
      }

      headEl.addEventListener('click',   toggle);
      headEl.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
      });
    }

    div.appendChild(headEl);

    if (hasContent) {
      const contentEl     = document.createElement('div');
      contentEl.className = 'entry-content';
      contentEl.innerHTML = entry.content;
      div.appendChild(contentEl);
    }

    if (accordionEl) div.appendChild(accordionEl);

    return div;
  }

  // ── Build one day group ──
  function buildDay(day) {
    const section     = document.createElement('section');
    section.className = 'day';
    section.dataset.date = day.date;

    const header     = document.createElement('div');
    header.className = 'day-header';
    header.textContent = day.date;
    section.appendChild(header);

    day.entries.forEach(entry => section.appendChild(buildEntry(entry)));
    return section;
  }

  // ── Render ──
  function render(days) {
    feed.innerHTML = '';
    const frag = document.createDocumentFragment();
    days.forEach(day => frag.appendChild(buildDay(day)));
    feed.appendChild(frag);
    emptyEl.style.display = days.length === 0 ? 'block' : 'none';
  }

// ── Bootstrap ──
    fetch('json/journal.json')
      .then(r => r.json())
      .then(data => { allDays = data; render(allDays); })
      .catch(() => {
        feed.innerHTML = '<p style="color:var(--text-muted);font-size:.875rem">Failed to load journal.json</p>';
      });
})();
</script>
</body>
</html>
