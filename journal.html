  <!-- Move dark mode script inside head to prevent flash -->
  <script>try{if(localStorage.getItem('darkMode')==='1')document.documentElement.classList.add('dark-mode');}catch(e){}</script>
</head>
<body>
  <a href="#main-content" class="skip-to-content">Skip to main content</a>
  <nav class="nav-links" id="main-nav"></nav>
  

  <main id="main-content" tabindex="-1">
    <header class="page-header page-header-branded page-header-bg-brand announcements-bg animated-bg">
       <h1 class="page-title" aria-label="Page title">Docs</h1>
     </header>

     <div class="filter-bar" id="journal-filters" aria-label="Filter docs and essays">
       <button id="searchToggle" class="search-toggle" aria-label="Search" title="Search" type="button">
         <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
       </button>
       <div class="filter-bar-search" id="filterBarSearch">
         <input type="text" id="indicatorSearch" class="indicator-search" placeholder="Search docs and essays..." autocomplete="off">
       </div>
       <div class="filters" id="filter-buttons"></div>
     </div>
    <div class="content">
      <!-- Journal entries feed -->
      <div id="journal-feed"></div>
      
      <!-- Essay reader container (shown when viewing essays) -->
      <div id="essay-reader-container" class="hidden">
        <div class="article-shell">
          <div id="article-status" class="article-status">Loading essays...</div>
          
          <section id="essay-index" class="essay-index" hidden>
            <div id="essay-filters" class="filters" aria-label="Filter essays by category"></div>
            <div id="essay-results" class="essay-results" aria-live="polite"></div>
          </section>
          
          <article id="article-reader" class="article-reader-card" hidden>
            <div class="article-toolbar">
              <button type="button" class="article-back-link" id="article-back-btn">
                <i data-lucide="arrow-left"></i>
                <span>Essays</span>
              </button>
            </div>
            <div id="article-content" class="article-content"></div>
          </article>
          
          <div id="article-error" class="article-error" hidden></div>
        </div>
      </div>
    </div>
  </main>

<!-- Footer Component -->
  <div id="footer-container"></div>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      fetch('components/footer.html')
        .then(response => response.text())
        .then(html => {
          document.getElementById('footer-container').innerHTML = html;
        })
        .catch(error => {
          console.error('Footer load error:', error);
        });
    });
  </script>

  <!-- Page-specific scripts -->
  <script src="js/services.js" defer></script>
  <script src="js/html-utils.js" defer></script>
  <script src="js/pages-config.js" defer></script>
  <script src="js/nav.js" defer></script>
  <script src="js/swipe-nav.js" defer></script>
  <script src="js/journal-feed.js" defer></script>
  <script src="js/search.js" defer></script>

  <!-- Load Lucide icons on-demand after page load -->
  <script>
    (function () {
      const loadLucide = () => {
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/lucide@0.400.0/dist/umd/lucide.js';
        script.defer = true;
        script.onload = () => window.lucide?.createIcons();
        document.head.appendChild(script);
      };
      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadLucide, { timeout: 3000 });
      } else {
        setTimeout(loadLucide, 100);
      }
    })();
  </script>

  <!-- Back to top button -->
  <script src="js/back-to-top.js" data-threshold="300" data-duration="400" data-label="Back to top" data-position="right" defer></script>
</body>
</html>
