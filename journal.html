<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Load HtmlUtils first - required for component loading -->
  <script src="js/html-utils.js"></script>

  <!-- Common Meta Tags Component -->
  <script>
    if (!window.HtmlUtils) {
      console.error('HtmlUtils not loaded');
    } else {
      window.HtmlUtils.injectHeadElements('components/head-meta.html');
    }
  </script>

  <!-- Page-specific Meta Tags -->
  <meta name="description"
    content="Independent commentary and personal insights from Doc Riter.">
  <meta name="keywords"
    content="Doc Riter, independent thoughts">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="site-data-version" content="20260419">

  <!-- Open Graph Meta Tags -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Doc Riter - Howdy, Stranger">
  <meta property="og:description"
    content="Independent commentary and personal insights from Doc Riter.">
  <meta property="og:url" content="https://howdystranger.net/journal.html">
  <meta property="og:site_name" content="Howdy, Stranger">
  <meta property="og:image" content="https://howdystranger.net/images/logo-1200x630.webp?v=1">
  <meta property="og:image:alt" content="Howdy, Stranger - Doc Riter and Commentary">

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:site" content="@DocRiter">
  <meta name="twitter:creator" content="@DocRiter">
  <meta name="twitter:title" content="Doc Riter - Howdy, Stranger">
  <meta name="twitter:description"
    content="Independent commentary and personal insights from Doc Riter.">
  <meta name="twitter:image" content="https://howdystranger.net/images/logo-1200x630.webp?v=1">
  <meta name="twitter:image:alt" content="Howdy, Stranger - Doc Riter and Commentary">

  <!-- Canonical URL -->
  <link rel="canonical" href="https://howdystranger.net/journal.html">

  <!-- Resource Hints for Navigation -->
  <link rel="prefetch" href="https://howdystranger.net/index.html">
  <link rel="prefetch" href="https://howdystranger.net/media.html">
  <link rel="prefetch" href="https://howdystranger.net/financials.html">

  <!-- Preconnect to external domains - CRITICAL for performance -->
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>

  <!-- Typography System Fonts Component -->
  <script>
    window.HtmlUtils?.injectHeadElements('components/fonts.html');
  </script>

  <!-- Preload CRITICAL resources only -->
  <link rel="preload" href="css/body.css?v=20260429" as="style">
  <link rel="preload" href="css/nav.css?v=20260429" as="style">
  <link rel="preload" href="css/article.css?v=20260321" as="style">
  <link rel="preload" href="css/news.css?v=20260429" as="style">

  <!-- Preload critical scripts -->
  <link rel="preload" href="js/nav.js" as="script">
  <link rel="preload" href="js/journal-feed.js" as="script">
  <link rel="preload" href="js/news-article.js" as="script">

  <!-- Critical CSS -->
  <link rel="stylesheet" href="css/theme.css?v=20260429">
  <link rel="stylesheet" href="css/body.css?v=20260429">
  <link rel="stylesheet" href="css/nav.css?v=20260429">
  <link rel="stylesheet" href="css/article.css?v=20260321" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="css/news.css?v=20260429" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="css/journal-tweets.css?v=20260321" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="css/page-branding.css?v=20260510">

  <title>Doc Riter - Howdy, Stranger</title>

  <!-- Analytics Component -->
  <script>
    window.HtmlUtils?.injectScriptsFromComponent('components/analytics.html');
  </script>

  <!-- Error Handling Component -->
  <script>
    window.HtmlUtils?.injectScriptsFromComponent('components/error-handling.html');
  </script>

  <!-- Inline critical CSS for LCP -->
  <style>
    /* Source toggle - matches h1.page-title */
    .source-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-xs);
      font-size: 0.85rem;
      font-family: var(--font-mono);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .source-toggle-btn {
      padding: 0;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font: inherit;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .source-toggle-btn:hover {
      color: var(--text-secondary);
    }

    .source-toggle-btn.active {
      color: var(--text-primary);
    }

    .source-toggle-btn + .source-toggle-btn::before {
      content: '|';
      margin-right: var(--spacing-xs);
      color: var(--text-muted);
      opacity: 0.4;
    }

    /* Utility hidden class to avoid inline styles */
    .hidden { display: none !important; }

    /* Search input styles - matching body.css */
    .search-wrapper {
        position: relative;
        max-width: 280px;
        margin: 10px auto 0;
    }

    .search-icon {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        color: var(--text-muted, #6c757d);
        pointer-events: none;
    }

    .indicator-search {
        width: 100%;
        padding: 0.5rem 0.75rem 0.5rem 2rem;
        border: 1px solid var(--border-color, #e5e7eb);
        border-radius: 8px;
        background: var(--bg-secondary, #f9fafb);
        color: var(--text-primary, #111827);
        font-size: 0.9rem;
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .indicator-search:focus {
        border-color: var(--logo-teal, #2c5f5a);
        box-shadow: 0 0 0 2px rgba(44, 95, 90, 0.15);
    }

    .indicator-search::placeholder {
        color: var(--text-muted, #6c757d);
        opacity: 0.6;
    }
  </style>

  <script type="module" src="js/speed-insights.js"></script>
  <meta name="robots" content="noindex, nofollow">
</head>

<body>
  <a href="#main-content" class="skip-to-content">Skip to main content</a>
  <nav class="nav-links" id="main-nav"></nav>
  <div class="page-left-accent">
    <img src="images/announcements.webp" alt="" width="32" height="32">
  </div>

  <main id="main-content" tabindex="-1">
    <div class="page-header page-header-branded page-header-bg-brand announcements-bg animated-bg">
      <img src="images/announcements.webp" alt="" width="32" height="32" class="page-brand-icon character-herald entrance-herald">
      <h1 class="page-title" aria-label="Page title">
        <div class="source-toggle" id="journal-filters" aria-label="Filter by source">
          <button type="button" class="source-toggle-btn active" data-source="journal">Docs</button>
          <button type="button" class="source-toggle-btn" data-source="news">Essays</button>
        </div>
      </h1>
    </div>

    <!-- Search Bar -->
    <div class="search-wrapper">
      <i data-lucide="search" class="search-icon"></i>
      <input type="text" id="indicatorSearch" class="indicator-search" placeholder="Search docs and essays..." autocomplete="off">
    </div>

    <div class="filters" id="journal-category-filters" aria-label="Filter essays by category">
    </div>
    <div class="content">
      <!-- Journal entries feed -->
      <div id="journal-feed"></div>
      
      <!-- Essay reader container (shown when viewing essays) -->
      <div id="essay-reader-container" class="hidden">
        <div class="article-shell">
          <div id="article-status" class="article-status">Loading essays...</div>
          
          <section id="essay-index" class="essay-index" hidden>
            <div id="essay-filters" class="filters" aria-label="Filter essays by category"></div>
            <div id="essay-results" class="essay-results" aria-live="polite"></div>
          </section>
          
          <article id="article-reader" class="article-reader-card" hidden>
            <div class="article-toolbar">
              <button type="button" class="article-back-link" id="article-back-btn">
                <i data-lucide="arrow-left"></i>
                <span>Essays</span>
              </button>
            </div>
            <div id="article-content" class="article-content"></div>
          </article>
          
          <div id="article-error" class="article-error" hidden></div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer Component -->
  <div id="footer-container"></div>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      window.HtmlUtils?.loadComponentToElement('components/footer.html', '#footer-container');
    });
  </script>

  <!-- Unified Scripts Component -->
  <script>
    window.HtmlUtils?.injectScriptsFromComponent('components/scripts-unified.html');
  </script>

  <!-- Page-specific scripts -->
  <script src="js/html-utils.js" defer></script>
  <script src="js/nav.js" defer></script>
  <script src="js/swipe-nav.js" defer></script>
  <script src="js/bfcache-compat.js" defer></script>
  <script src="js/news-article.js" defer></script>
  <script src="js/journal-feed.js" defer></script>
  <script src="js/search.js" defer></script>

  <!-- Load Lucide icons on-demand after page load -->
  <script>
    (function () {
      const loadLucide = () => {
        if (window.lucide) return;
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/lucide@0.400.0/dist/umd/lucide.js';
        script.defer = true;
        script.onload = () => window.lucide?.createIcons();
        document.head.appendChild(script);
      };

      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadLucide, { timeout: 3000 });
      } else {
        setTimeout(loadLucide, 100);
      }
    })();
  </script>

  <!-- Load non-critical analytics after idle -->
  <script>
    const loadNonCriticalScripts = () => {
      const speedInsights = document.createElement('script');
      speedInsights.src = 'js/speed-insights.js';
      speedInsights.type = 'module';
      speedInsights.defer = true;
      document.body.appendChild(speedInsights);
    };

     if ('requestIdleCallback' in window) {
       requestIdleCallback(loadNonCriticalScripts);
     } else {
       window.addEventListener('load', () => setTimeout(loadNonCriticalScripts, 1000));
     }
   </script>

  <!-- Back to top button -->
  <script src="js/back-to-top.js" data-threshold="300" data-duration="400" data-label="Back to top" data-position="right" defer></script>
</body>
</html>
