  <script>
    (function () {
      const toggle = document.getElementById('darkModeToggle');
      function updateToggle() {
        if (!toggle) return;
        const isDark = document.documentElement.classList.contains('dark-mode');
        toggle.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
        toggle.setAttribute('title', isDark ? 'Switch to light mode' : 'Switch to dark mode');
      }
      if (toggle) {
        toggle.addEventListener('click', () => {
          document.documentElement.classList.toggle('dark-mode');
          try { localStorage.setItem('darkMode', document.documentElement.classList.contains('dark-mode') ? '1' : '0'); } catch (e) {}
          updateToggle();
        });
      }
      updateToggle();
    })();
  </script>

  <main id="main-content" tabindex="-1" style="view-transition-name: main-content;">

    </div>

  <script>
    (function () {
      'use strict';

      const feed = document.getElementById('feed');
      const emptyEl = document.getElementById('empty');
      const loadMore = document.getElementById('load-more');
      const mdCache = {};
      const BATCH_DAYS = 3;
      let allDays = [];
      let renderIndex = 0;

      const imageSizes = {
        'images/read.webp': [16, 16],
        'images/arrivals-of-ships.png': [1200, 800],
        'images/U.S. Department-small.png': [300, 220],
        'images/Zeekr.png': [1516, 1220]
      };

      function stripFrontmatter(md) {
        const match = String(md || '').match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
        return match ? match[2].trim() : String(md || '').trim();
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function escapeAttr(value) {
        return escapeHtml(value).replace(/`/g, '&#96;');
      }

      function renderTitle(title, link) {
        if (/<a\s/i.test(title)) return title;
        const esc = escapeHtml(title);
        if (link) {
          const ext = /^https?:\/\//i.test(link) ? ' target="_blank" rel="noopener noreferrer"' : '';
          return '<a href="' + escapeAttr(link) + '"' + ext + '>' + esc + '</a>';
        }
        return esc;
      }

      function parseInline(text, autolink) {
        const htmlBlocks = [];
        let out = String(text).replace(/<[^>]*>/g, match => {
          htmlBlocks.push(match);
          return '@@HTML' + (htmlBlocks.length - 1) + '@@';
        });

        out = escapeHtml(out)
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          .replace(/\*([^*]+)\*/g, '<em>$1</em>');

        const links = [];
out = out.replace(/\[([^\]]+)]\(([^\s)]+)\)/g, (_, label, url) => {
           const ext = /^https?:\/\//i.test(url) ? ' target="_blank" rel="noopener noreferrer"' : '';
           links.push('<a href="' + escapeAttr(url) + '"' + ext + '>' + parseInline(label, false) + '</a>');
           return '@@LINK' + (links.length - 1) + '@@';
         });

        if (autolink) {
          out = out.replace(/https?:\/\/[^\s<)]+/g, url => '<a href="' + escapeAttr(url) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(url) + '</a>');
        }

        out = out.replace(/@@LINK(\d+)@@/g, (_, i) => links[Number(i)] || '');
        out = out.replace(/@@HTML(\d+)@@/g, (_, i) => htmlBlocks[Number(i)] || '');

        return out;
      }

      function parseMarkdown(markdown) {
        const lines = stripFrontmatter(markdown).replace(/\r\n/g, '\n').split('\n');
        let html = '';
        let paragraph = [];
        let inCode = false;
        let inList = false;

        function flushParagraph() {
          if (!paragraph.length) return;
          html += '<p>' + parseInline(paragraph.join(' '), true) + '</p>';
          paragraph = [];
        }

        function closeList() {
          if (!inList) return;
          html += '</ul>';
          inList = false;
        }

        lines.forEach(line => {
          const trimmed = line.trim();
          if (!trimmed) {
            flushParagraph();
            return;
          }

          if (/^```/.test(line)) {
            flushParagraph();
            closeList();
            if (inCode) {
              html += '</code></pre>';
              inCode = false;
            } else {
              html += '<pre><code>';
              inCode = true;
            }
            return;
          }

          if (inCode) {
            html += escapeHtml(line) + '\n';
            return;
          }

          const heading = line.match(/^(#{1,6})\s+(.+)$/);
          if (heading) {
            flushParagraph();
            closeList();
            const level = Math.min(heading[1].length, 3);
            html += '<h' + level + '>' + parseInline(heading[2], true) + '</h' + level + '>';
            return;
          }

          const quote = line.match(/^>\s?(.+)$/);
          if (quote) {
            flushParagraph();
            closeList();
            html += '<blockquote>' + parseInline(quote[1], true) + '</blockquote>';
            return;
          }

          const item = line.match(/^[-*]\s+(.+)$/);
          if (item) {
            flushParagraph();
            if (!inList) {
              html += '<ul>';
              inList = true;
            }
            html += '<li>' + parseInline(item[1], true) + '</li>';
            return;
          }

          paragraph.push(trimmed);
        });

        flushParagraph();
        closeList();
        if (inCode) html += '</code></pre>';
        return html;
      }

      function getAttr(tag, name) {
        const match = tag.match(new RegExp('\\s' + name + '\\s*=\\s*(?:"([^"]*)"|\'([^\']*)\')', 'i'));
        return (match && (match[1] || match[2] || '')).trim();
      }

      function imageSize(src) {
        return imageSizes[src] || [1200, 675];
      }

      function normalizeImages(html) {
        return String(html || '').replace(/<img\b[^>]*>/gi, tag => {
          const src = getAttr(tag, 'src');
          if (!src) return '';
          const alt = getAttr(tag, 'alt') || '';
          const size = imageSize(src);
          const attrs = 'src="' + escapeAttr(src) + '" alt="' + escapeAttr(alt) + '" width="' + size[0] + '" height="' + size[1] + '" loading="lazy" decoding="async"';
          const external = /^https?:\/\//i.test(src);
          const img = '<img ' + attrs + (external ? ' referrerpolicy="no-referrer" crossorigin="anonymous"' : '') + '>';
          return external ? '<a class="media-link" href="' + escapeAttr(src) + '" target="_blank" rel="noopener noreferrer" aria-label="Open image">' + img + '</a>' : img;
        });
      }

      function normalizeIframes(html) {
        return String(html || '').replace(/<iframe\b[^>]*>/gi, tag => {
          const src = getAttr(tag, 'src');
          if (!src) return '';
          const title = getAttr(tag, 'title') || 'Embedded video';
          return '<div class="video-placeholder" role="button" tabindex="0" data-video-src="' + escapeAttr(src) + '" aria-label="Play ' + escapeAttr(title) + '">Play video</div>';
        });
      }

      function normalizeContent(html) {
        return normalizeIframes(normalizeImages(html));
      }

      function buildEntry(entry) {
        const hasFile = !!entry.file;
        const hasContent = !!entry.content;
        const hasLink = !!entry.link;
        const div = document.createElement('div');
        div.className = 'entry';

        const headEl = document.createElement('div');
        headEl.className = 'entry-head' + (hasFile ? ' has-toggle' : '');

        const titleEl = document.createElement('span');
        titleEl.className = 'entry-title';
        titleEl.innerHTML = renderTitle(entry.title, hasLink ? entry.link : null);

        const metaEl = document.createElement('span');
        metaEl.className = 'entry-meta';
        if (entry.time) {
          const time = document.createElement('span');
          time.className = 'entry-time';
          time.textContent = entry.time;
          metaEl.appendChild(time);
        }

        headEl.appendChild(titleEl);
        headEl.appendChild(metaEl);

        let accordionEl = null;
        if (hasFile) {
          const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
          svg.setAttribute('class', 'chevron');
          svg.setAttribute('viewBox', '0 0 14 14');
          svg.setAttribute('fill', 'none');
          svg.setAttribute('stroke', 'currentColor');
          svg.setAttribute('stroke-width', '1.5');
          svg.setAttribute('stroke-linecap', 'round');
          svg.setAttribute('stroke-linejoin', 'round');
          svg.setAttribute('aria-hidden', 'true');
          svg.innerHTML = '<polyline points="4,2 9,7 4,12"/>';
          headEl.insertBefore(svg, titleEl);

          accordionEl = document.createElement('div');
          accordionEl.className = 'accordion';
          accordionEl.hidden = true;
          accordionEl.setAttribute('role', 'region');

          const inner = document.createElement('div');
          inner.className = 'accordion-inner';
          accordionEl.appendChild(inner);

          let loaded = false;
          headEl.setAttribute('role', 'button');
          headEl.setAttribute('tabindex', '0');
          headEl.setAttribute('aria-expanded', 'false');

          function toggle() {
            const open = headEl.getAttribute('aria-expanded') === 'true';
            headEl.setAttribute('aria-expanded', String(!open));
            accordionEl.hidden = open;

            if (!open && !loaded) {
              loaded = true;
              inner.innerHTML = '<span class="loading">Loading…</span>';
              if (mdCache[entry.file]) {
                inner.innerHTML = normalizeContent(parseMarkdown(mdCache[entry.file]));
                return;
              }
              fetch(entry.file)
                .then(response => response.ok ? response.text() : Promise.reject(response.status))
                .then(text => {
                  mdCache[entry.file] = text;
                  inner.innerHTML = normalizeContent(parseMarkdown(text));
                })
                .catch(() => {
                  inner.innerHTML = '<span class="loading">Could not load file.</span>';
                });
            }
          }

          headEl.addEventListener('click', toggle);
          headEl.addEventListener('keydown', event => {
            if (event.key === 'Enter' || event.key === ' ') {
              event.preventDefault();
              toggle();
            }
          });
        }

        div.appendChild(headEl);

        if (hasContent) {
          const contentEl = document.createElement('div');
          contentEl.className = 'entry-content';
          contentEl.innerHTML = normalizeContent(entry.content);
          div.appendChild(contentEl);
        }

        if (accordionEl) div.appendChild(accordionEl);
        return div;
      }

      function buildDay(day) {
        const section = document.createElement('section');
        section.className = 'day';
        section.dataset.date = day.date;

        const header = document.createElement('div');
        header.className = 'day-header';
        header.textContent = day.date;
        section.appendChild(header);

        (day.entries || []).forEach(entry => section.appendChild(buildEntry(entry)));
        return section;
      }

      function renderMore() {
        const next = allDays.slice(renderIndex, renderIndex + BATCH_DAYS);
        const fragment = document.createDocumentFragment();
        next.forEach(day => fragment.appendChild(buildDay(day)));
        feed.appendChild(fragment);
        renderIndex += next.length;
        loadMore.classList.toggle('is-visible', renderIndex < allDays.length);
        emptyEl.style.display = allDays.length === 0 ? 'block' : 'none';
      }

      function activateVideo(target) {
        if (!target || target.dataset.loaded === 'true') return;
        target.dataset.loaded = 'true';
        const iframe = document.createElement('iframe');
        iframe.width = '560';
        iframe.height = '315';
        iframe.src = target.dataset.videoSrc;
        iframe.title = 'Embedded video';
        iframe.loading = 'lazy';
        iframe.referrerPolicy = 'strict-origin-when-cross-origin';
        iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
        iframe.allowFullscreen = true;
        target.replaceWith(iframe);
      }

      feed.addEventListener('click', event => {
        activateVideo(event.target.closest('[data-video-src]'));
      });

      feed.addEventListener('keydown', event => {
        const target = event.target.closest('[data-video-src]');
        if (!target) return;
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          activateVideo(target);
        }
      });

      loadMore.addEventListener('click', renderMore);

      fetch('json/journal.json')
        .then(response => response.ok ? response.json() : Promise.reject(response.status))
        .then(data => {
          allDays = Array.isArray(data) ? data : [];
          renderMore();
        })
        .catch(() => {
          feed.innerHTML = '<p style="color:var(--text-muted);font-size:.9rem">Failed to load journal.json</p>';
          emptyEl.style.display = 'none';
          loadMore.style.display = 'none';
        });
    })();
  </script>
  <script src="js/view-transitions.js" defer></script>
