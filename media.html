<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Load services and HtmlUtils first - required for data fetching and component loading -->

  <script src="js/html-utils.js"></script>

  <!-- Common Meta Tags Component -->

    } else {
      window.HtmlUtils.injectHeadElements('components/head-meta.html');
    }
  </script>

  <!-- Page-specific Meta Tags -->

  <!-- Open Graph Meta Tags -->
  <meta property="og:type" content="website">

    content="Curated books, films, and podcasts worth your time from The Doc Riter. Independent media recommendations.">

  <meta name="twitter:card" content="summary">

  <meta name="twitter:creator" content="@DocRiter">
  <meta name="twitter:title" content="Media - Howdy, Stranger">
  <meta name="twitter:description"
    content="Curated books, films, and podcasts worth your time from The Doc Riter. Independent media recommendations.">
  <meta name="twitter:image" content="https://howdystranger.net/images/logo-1200x630.webp?v=1">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">
  <link rel="icon" type="image/webp" sizes="32x32" href="images/favicon-32x32.webp">

  <!-- Theme Color -->
  <meta name="theme-color" content="#2c5f5a">

  <!-- Preconnect to external domains - CRITICAL for performance -->
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="preconnect" href="https://d28hgpri8am2if.cloudfront.net">

  <!-- Typography System Fonts Component -->
  <script>
    window.HtmlUtils?.injectHeadElements('components/fonts.html');
  </script>

  <!-- Preload CRITICAL resources only -->
  <link rel="preload" href="css/body.css?v=20260429" as="style">
  <link rel="preload" href="css/nav.css?v=20260429" as="style">
  <link rel="preload" href="css/media.css?v=20260429" as="style">

  <!-- Preload Font Awesome fonts -->
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/webfonts/fa-solid-900.woff2"
    as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/webfonts/fa-brands-400.woff2"
    as="font" type="font/woff2" crossorigin>

  <!-- Preload critical scripts -->
  <link rel="preload" href="js/nav.js" as="script">
  <link rel="preload" href="js/media.js" as="script">

  <!-- Critical CSS -->
  <link rel="stylesheet" href="css/theme.css?v=20260429">
  <link rel="stylesheet" href="css/body.css?v=20260429">
  <link rel="stylesheet" href="css/nav.css?v=20260429">
  <link rel="stylesheet" href="css/media.css?v=20260429">
  <link rel="stylesheet" href="css/media-overlay.css?v=20251220">
  <link rel="stylesheet" href="css/media-coachella.css?v=20260412">
  <link rel="stylesheet" href="css/page-branding.css?v=20260510">

  <!-- Font Awesome - load async -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" media="print" onload="this.media='all'">

  <title>Media - Howdy, Stranger</title>

  <!-- Analytics Component -->
  <script>
    window.HtmlUtils?.injectScriptsFromComponent('components/analytics.html');
  </script>



  <!-- Error Handling Component -->
  <script>
    window.HtmlUtils?.injectScriptsFromComponent('components/error-handling.html');
  </script>


  <!-- Inline critical CSS for LCP -->
  <style>
    /* Critical styles for first paint */
    .media-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1.5rem;
      padding: 2rem;
    }

    @media (max-width: 768px) {
      .media-cards {
        grid-template-columns: repeat(2, 1fr);
      }

      .media-card {
        max-width: none;
      }
    }

    .media-card {
      max-width: 150px;
      width: 100%;
      border-radius: 0.5rem;
      contain: layout style paint;
    }

    .media-cover-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: 0.5rem;
      contain: layout;
      background: #2C5F5A;
    }

    .video-card .media-cover-container {
      aspect-ratio: 16 / 9;
    }

    .movie-card .media-cover-container {
      aspect-ratio: 2 / 3;
    }

    .media-cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 0.5rem;
    }

    .loading-state {
      text-align: center;
      padding: 3rem;
      font-size: 1.2rem;
    }

    .fa-spinner {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

     /* Font optimization */
    @font-face {
      font-family: 'FontAwesome';
      src: url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/webfonts/fa-solid-900.woff2') format('woff2');
      font-weight: 900;
      font-display: swap;
      size-adjust: 95%;
    }

    @font-face {
      font-family: 'FontAwesome Brands';
      src: url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/webfonts/fa-brands-400.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
      size-adjust: 95%;
    }
  </style>

</head>

<body>
  <nav class="nav-links" id="main-nav"></nav>


<main id="main-content" tabindex="-1">
      <div class="page-header page-header-branded">
        <h1 class="page-title" aria-label="Page title">Media</h1>
      </div>

      <div class="filter-bar" id="media-filters" aria-label="Filter media by type">
        <button id="searchToggle" class="search-toggle" aria-label="Search" title="Search" type="button">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </button>
        <div class="filter-bar-search" id="filterBarSearch">
          <input type="text" id="indicatorSearch" class="indicator-search" placeholder="Search media..." autocomplete="off">
        </div>
      </div>

      <div class="media-filters" style="display: none;">
        <select id="filter-type" aria-label="Filter by media type">
          <option value="all">All</option>
        </select>
        <label data-short="Sort:">
          <select id="sort-by" aria-label="Sort media">
            <option value="date-desc">Newest</option>
            <option value="title-asc">A-Z</option>
          </select>
        </label>
      </div>

     <div class="media-cards" id="media-cards-container">
       <!-- Featured: Latest Doc Riter Podcast -->
       <div class="featured-latest-section">
         <h3 class="featured-label">Latest Episode</h3>
         <div class="latest-episode-card">
           <div class="latest-episode-cover">
             <img src="images/logo.webp" alt="Doc Riter Podcast" width="120" height="120" loading="eager">
           </div>
           <div class="latest-episode-info">
             <h4 class="latest-episode-title">Saturday April 25th</h4>
             <p class="latest-episode-desc">Critical economic and geopolitical developments analysis.</p>
             <div class="latest-platform-links">
               <a href="https://open.spotify.com/episode/1PX0kRVRiPymSY27V080c2?si=a17125a387f4435a" target="_blank" rel="noopener noreferrer" class="action-link spotify-link" title="Listen on Spotify">
                 <i class="fab fa-spotify"></i> Spotify
               </a>
               <a href="https://music.amazon.com/podcasts/1167b390-83bc-438f-8437-9441871a3bc5/episodes/353203f2-3958-4f94-ab04-68e317ad5920/doc-riter-saturday-april-25th" target="_blank" rel="noopener noreferrer" class="action-link amazon-link" title="Listen on Amazon Music">
                 <i class="fab fa-amazon"></i> Amazon
               </a>
               <a href="https://podcasts.apple.com/us/podcast/saturday-april-25th/id1529618289?i=1000763591281" target="_blank" rel="noopener noreferrer" class="action-link apple-link" title="Listen on Apple Podcasts">
                 <i class="fab fa-apple"></i> Apple
               </a>
               <a href="https://youtu.be/uFxsW5Myp7M" target="_blank" rel="noopener noreferrer" class="action-link youtube-link" title="Watch on YouTube">
                 <i class="fab fa-youtube"></i> YouTube
               </a>
             </div>
           </div>
         </div>
       </div>
       <!-- Cards appended from media.json -->
     </div>

    <div id="playlist-overlay" class="playlist-overlay" style="display: none;" role="dialog" aria-modal="true"
      aria-labelledby="overlay-title">
      <div class="playlist-overlay-content">
        <h2 id="overlay-title"></h2>
        <ul id="overlay-songs" class="overlay-songs" role="list"></ul>
      </div>
    </div>
  </main>

  <!-- Footer Component -->
  <div id="footer-container"></div>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      window.HtmlUtils?.loadComponentToElement('components/footer.html', '#footer-container');
    });
  </script>

  <!-- Unified Scripts Component -->
  <script>
    window.HtmlUtils?.injectScriptsFromComponent('components/scripts-unified.html');
  </script>

  <!-- Load scripts - nav and socials defer but load quickly for header/footer -->
   <script src="js/nav.js" defer></script>
   <script src="js/swipe-nav.js" defer></script>

   <script src="js/media.js"></script>
   <script src="js/search.js" defer></script>

   <!-- Load Lucide icons on-demand after page load -->
  <script>
    (function () {
      const loadLucide = () => {
        if (window.lucide) return;
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/lucide@0.400.0/dist/umd/lucide.js';
        script.defer = true;
        script.onload = () => window.lucide?.createIcons();
        document.head.appendChild(script);
      };

      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadLucide, { timeout: 3000 });
      } else {
        setTimeout(loadLucide, 100);
      }
    })();
  </script>

  <!-- Load non-critical analytics after idle -->
  <script>
    const loadNonCriticalScripts = () => {
      const speedInsights = document.createElement('script');
      speedInsights.src = 'js/speed-insights.js';
      speedInsights.type = 'module';
      speedInsights.defer = true;
      document.body.appendChild(speedInsights);
    };

     if ('requestIdleCallback' in window) {
       requestIdleCallback(loadNonCriticalScripts);
     } else {
       window.addEventListener('load', () => setTimeout(loadNonCriticalScripts, 1000));
     }
   </script>

   <!-- Back to top button -->
   <script src="js/back-to-top.js" data-threshold="300" data-duration="400" data-label="Back to top" data-position="right" defer></script>

 
</body>
</html>
