    /* Critical styles for first paint */
    .media-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1.5rem;
      padding: 2rem;
    }

    @media (max-width: 768px) {

      }

      .media-card {
        max-width: none;
      }
    }

    .media-card {
      max-width: 150px;
      width: 100%;
      border-radius: 0.5rem;
      contain: layout style paint;
    }

    .media-cover-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: 0.5rem;
      contain: layout;
      background: #2C5F5A;
    }

    .video-card .media-cover-container {
      aspect-ratio: 16 / 9;
    }

    .movie-card .media-cover-container {
      aspect-ratio: 2 / 3;
    }

    .media-cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 0.5rem;
    }

    .loading-state {
      text-align: center;
      padding: 3rem;
      font-size: 1.2rem;
    }

    .fa-spinner {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {

      }
    }

</style>

  <script>
    (function () {
      const toggle = document.getElementById('darkModeToggle');
      function updateToggle() {
        if (!toggle) return;
        const isDark = document.documentElement.classList.contains('dark-mode');
        toggle.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
        toggle.setAttribute('title', isDark ? 'Switch to light mode' : 'Switch to dark mode');
      }
      if (toggle) {
        toggle.addEventListener('click', () => {
          document.documentElement.classList.toggle('dark-mode');
          try { localStorage.setItem('darkMode', document.documentElement.classList.contains('dark-mode') ? '1' : '0'); } catch (e) {}
          updateToggle();
        });
      }
      updateToggle();
    })();
  </script>
