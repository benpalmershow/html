  <!-- Inline critical CSS for LCP -->
  <style>
    /* Critical styles for first paint */
    .media-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1.5rem;
      padding: 2rem;
    }

    @media (max-width: 768px) {
      .media-cards {
        grid-template-columns: repeat(2, 1fr);
      }

      .media-card {
        max-width: none;
      }
    }

    .media-card {
      max-width: 150px;
      width: 100%;
      border-radius: 0.5rem;
      contain: layout style paint;
    }

    .media-cover-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: 0.5rem;
      contain: layout;
      background: #2C5F5A;
    }

    .video-card .media-cover-container {
      aspect-ratio: 16 / 9;
    }

    .movie-card .media-cover-container {
      aspect-ratio: 2 / 3;
    }

    .media-cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 0.5rem;
    }

    .loading-state {
      text-align: center;
      padding: 3rem;
      font-size: 1.2rem;
    }

    .fa-spinner {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Search input styles */
    .search-label {
      position: relative;
      width: 100%;
    }

    .search-label input {
      padding-right: 2.5rem;
    }

    .search-icon {
      position: absolute;
      right: 0.8rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-gray-500, #6c757d);
      pointer-events: none;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }

    /* Font optimization */
    @font-face {
      font-family: 'FontAwesome';
      src: url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/webfonts/fa-solid-900.woff2') format('woff2');
      font-weight: 900;
      font-display: swap;
      size-adjust: 95%;
    }

    @font-face {
      font-family: 'FontAwesome Brands';
      src: url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/webfonts/fa-brands-400.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
      size-adjust: 95%;
    }

<body>

  <script src="js/media.js"></script>

  <!-- Load Lucide icons on-demand after page load -->
  <script>
    (function () {
      const loadLucide = () => {
        if (window.lucide) return;
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/lucide@0.400.0/dist/umd/lucide.js';
        script.defer = true;
        script.onload = () => window.lucide?.createIcons();
        document.head.appendChild(script);
      };

      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadLucide, { timeout: 3000 });
      } else {
        setTimeout(loadLucide, 100);
      }
    })();
  </script>

  <!-- Load non-critical analytics after idle -->
  <script>
    const loadNonCriticalScripts = () => {
      const speedInsights = document.createElement('script');
      speedInsights.src = 'js/speed-insights.js';
      speedInsights.type = 'module';
      speedInsights.defer = true;
      document.body.appendChild(speedInsights);
    };

     if ('requestIdleCallback' in window) {
       requestIdleCallback(loadNonCriticalScripts);
     } else {
       window.addEventListener('load', () => setTimeout(loadNonCriticalScripts, 1000));
     }
   </script>

   <!-- Back to top button -->
   <script src="js/back-to-top.js" data-threshold="300" data-duration="400" data-label="Back to top" data-position="right" defer></script>
