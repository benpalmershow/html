<!DOCTYPE html>
<html lang="en">

<head>
  <script>
    fetch('components/head-meta.html')
      .then(response => response.text())
      .then(html => {
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = html;
        const metaElements = tempDiv.querySelectorAll('meta, link');
        metaElements.forEach(element => {
          document.head.appendChild(element.cloneNode(true));
        });
      })
      .catch(error => console.error('Meta tags load error:', error));
  </script>

  <meta name="description" content="Independent article and policy analysis from Howdy, Stranger.">
  <meta name="keywords" content="news, article, policy analysis, economic commentary, Howdy Stranger">
  <meta name="site-data-version" content="20260529">

  <meta property="og:type" content="article">
  <meta property="og:title" content="Article - Howdy, Stranger">
  <meta property="og:description" content="Independent article and policy analysis from Howdy, Stranger.">

  <meta property="og:image" content="https://howdystranger.net/images/logo-1200x630.webp?v=1">

  <script>
    fetch('components/fonts.html')
      .then(response => response.text())
      .then(html => {
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = html;
        const linkElements = tempDiv.querySelectorAll('link');
        linkElements.forEach(element => {
          document.head.appendChild(element.cloneNode(true));

      })
      .catch(error => console.error('Fonts load error:', error));

  <link rel="stylesheet" href="css/theme.css?v=20260429">
  <link rel="stylesheet" href="css/body.css?v=20260429">
  <link rel="stylesheet" href="css/nav.css?v=20260429">
  <link rel="stylesheet" href="css/article.css?v=20260321">
  <link rel="stylesheet" href="css/news.css?v=20260429">

  <link rel="preload" href="js/nav.js" as="script">
  <link rel="preload" href="js/news-article.js" as="script">

  <title>Essays - Howdy, Stranger</title>

  <style>
    .article-shell {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 var(--content-padding) var(--spacing-xl);
    }

    .article-reader-card {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 18px;
      padding: clamp(1rem, 2vw, 1.5rem);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.06);
    }

    @media (max-width: 640px) {
      .article-reader-card {
        border-radius: 12px;
        padding: 1rem;
      }

      .article-toolbar {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>

  <script>
    fetch('components/analytics.html')
      .then(response => response.text())
      .then(html => {
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = html;
        const scriptElements = tempDiv.querySelectorAll('script');
        scriptElements.forEach(script => {
          const newScript = document.createElement('script');
          newScript.textContent = script.textContent;
          document.head.appendChild(newScript);
        });
      })
      .catch(error => console.error('Analytics load error:', error));
  </script>

  <script>
    window.addEventListener('load', function () {
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';
      script.async = true;
      document.head.appendChild(script);
    });
  </script>

  <script>
    if (typeof window !== 'undefined' && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
      const script = document.createElement('script');
      script.src = '/_vercel/insights/script.js';
      script.defer = true;
      document.head.appendChild(script);
    }
  </script>
  <script type="module" src="js/speed-insights.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.400.0/dist/umd/lucide.js" defer onerror="console.error('Failed to load Lucide')"></script>
</head>

<body>
  <a href="#main-content" class="skip-to-content">Skip to main content</a>

  <nav class="nav-links" id="main-nav"></nav>

   <div class="page-left-accent">
     <img src="images/read.webp" alt="" width="32" height="32">
   </div>

<main id="main-content" tabindex="-1">
      <div class="page-header page-header-branded">
        <img src="images/read.webp" alt="" width="32" height="32" class="page-brand-icon character-scholar entrance-slide">
        <h1 class="page-title" aria-label="Page title">Essays</h1>
      </div>

<div class="filter-bar" id="essay-filters" aria-label="Filter essays by category">
        <button id="searchToggle" class="search-toggle" aria-label="Search" title="Search" type="button">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </button>
        <div class="filter-bar-search" id="filterBarSearch">
          <input type="text" id="indicatorSearch" class="indicator-search" placeholder="Search essays..." autocomplete="off">
        </div>
      </div>

      <div class="article-shell">
        <div id="article-status" class="article-status">Loading essays...</div>

        <section id="essay-index" class="essay-index" hidden>
          <div id="category-filters" class="filters" aria-label="Filter essays by category"></div>
          <div id="essay-results" class="essay-results" aria-live="polite"></div>
        </section>

      <article id="article-reader" class="article-reader-card" hidden>
        <div class="article-toolbar">
          <a href="news.html" class="article-back-link">
            <i data-lucide="arrow-left"></i>
            Essays
          </a>
        </div>

        <div id="article-content" class="article-content"></div>
      </article>

      <div id="article-error" class="article-error" hidden></div>
    </div>
  </main>

  <div id="footer-container"></div>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      fetch('components/footer.html')
        .then(response => response.text())
        .then(html => {
          document.getElementById('footer-container').innerHTML = html;
        })
        .catch(error => {
          console.error('Footer load error:', error);
        });
    });
  </script>

  <script>

      .then(response => response.text())

          newScript.textContent = script.textContent;

      .catch(error => console.error('Scripts load error:', error));
